<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NISE CAFE - 落ち着くひとときを</title>

    <!-- google tag managerの設定。WebサイトとGoogleのサーバーをつなぐ「受信機」の役割 -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-P9C63JCN');</script>

    <style>
        /* CSS：オシャレなカフェの雰囲気を演出 */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            color: #ccc; /* 文字色を少し明るく */
            background: #222; /* 背景をダークに */
        }
        
        /* 【画像埋め込みポイント】メインビジュアル */
        .hero { 
            height: 100vh; /* 画面いっぱいに表示 */
            background: 
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), /* 画像を少し暗くして文字を見やすく */
                url('sample/step2/top.png') center/cover; /* ここでtop.pngを読み込む */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white;
            flex-direction: column;
            text-align: center;
        }
        
        /* タイトルなどをオシャレに */
        .hero h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero p { font-size: 1.2rem; max-width: 600px; line-height: 1.6; }

        /* スクロールを促すためのエリア */
        .content { 
            padding: 100px 20px; 
            text-align: center; 
            max-width: 900px; 
            margin: auto; 
        }
        
        /* スクロール計測用の大きな余白 */
        /* 修正後：上下に100pxの余白を強制し、高さは中身に合わせる */
        .section { 
            min-height: 80vh; /* 画面の8割の高さを確保しつつ、伸び縮み可能に */
            padding: 100px 0; /* 上下の余白を「100px」で統一 */
            box-sizing: border-box; /* パディングを含めたサイズ計算にする */
            border-bottom: 1px dashed #555; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* 画像ギャラリー用のスタイル */
        .image-gallery {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            justify-content: center;
            width: 100%;
        }

        .image-gallery img {
            width: 45%; /* 2枚並び */
            aspect-ratio: 1.2 / 1; /* 横1.2：縦1の比率に固定 */
            object-fit: cover;   /* 枠に合わせて画像を綺麗にトリミング */
            border-radius: 8px; /* 角を少し丸く */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease; /* アニメーション */
        }

        .image-gallery img:hover {
            transform: translateY(-5px); /* マウスを乗せると少し浮く */
        }
        
        /* 分析対象となるボタン：計測しやすいようIDを付ける */
        .btn { 
            display: inline-block; 
            padding: 18px 40px; 
            background: #d4a77e; /* アンティーク調のゴールド */
            color: #222; 
            text-decoration: none; 
            border-radius: 4px; /* 少し角を残す */
            transition: 0.3s; 
            cursor: pointer; 
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .btn:hover { 
            background: #b8865a; 
            transform: scale(1.03); 
        }

        /* Streamlit結果表示エリア */
        #result-area {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            width: 80%;
            min-height: 50px;
        }

        /* --- スマホ用の設定（画面幅が768px以下の時だけ発動） --- */
        @media (max-width: 768px) {
            .image-gallery {
                flex-direction: column; /* 横並びを「縦並び」に変更 */
                align-items: center;    /* 中央に寄せる */
            }
        
            .image-gallery img {
                width: 90%; /* スマホ画面の横幅いっぱいに近く表示（迫力アップ！） */
                margin-bottom: 10px; /* 画像同士の間に少し隙間を作る */
            }
        
            .hero h1 {
                font-size: 2rem; /* スマホだと文字が大きすぎるので少し小さく */
            }
        }
    </style>
</head>
<body>
    <!-- google tag managerの設定 -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P9C63JCN" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="hero">
        <h1>Welcome to NISE Cafe</h1>
        <p>静寂と光が織りなす空間で、<br>特別な一杯とアンティークなひとときを。</p>
        <p>勉強用偽サイトです。</p>
    </div>

    <div class="content">
        <div class="section" id="intro">
            <h2>こだわり抜いた豆と、静かな空間。</h2>
            <p>下へスクロールして、私たちのメニューをチェックしてください。</p>
            <div class="image-gallery">
                <img src="sample/step2/kv1.png" alt="Coffee 1">
                <img src="sample/step2/kv2.png" alt="Coffee 2">
            </div>
        </div>


        
        <div class="section" id="menu">
            <h2>季節のケーキセット</h2>
            <p>評価4.0以上の厳選されたスイーツをご用意しています。</p>
            <div class="image-gallery">
                <img src="sample/step2/cake1.png" alt="Cake 1">
                <img src="sample/step2/cake2.png" alt="Cake 2">
            </div>  
            <button class="btn" id="reservation_btn">今すぐ予約する</button>
        </div>


        <div class="section" id="python-area" style="border-bottom: none;">
            <h2>AIおすすめ診断</h2>
            <p>Python(Streamlit)を呼び出して、あなたにぴったりの一杯を診断します。</p>
            <button class="btn" onclick="callPython()">AI診断を起動</button>
            <div id="result-area"></div>
        </div>
    </div>

    <script>
        // ボタンクリック時の挙動（予約画面へのシミュレーション）
        document.getElementById('reservation_btn').onclick = function() {
            alert('予約ページへ進みます（このクリックはGTMで計測可能です）');
        };

        // Streamlitへの連携用（概念的な呼び出し）
        function callPython() {
            const area = document.getElementById('result-area');
            // ここでPythonの結果を表示させるイメージ
            area.innerHTML = "<p style='color:#d4a77e; font-weight:bold;'>[Streamlit連携中...] AI診断の結果：『ヴィクトリアン・ブレンド』</p>";
            console.log("Python Backend triggered.");
        }

        /* 【分析のポイント】
        GTMを設定すると、JavaScriptを書かなくても「ID: reservation_btn がクリックされた数」や
        「ページを90%まで読んだ（スクロールした）数」が自動でGA4に送られるようになります。
        */
    </script>
</body>
</html>

スクロール率を上げるために、CSSで余白を作り、興味を引くコンテンツを配置する感覚を養います。
