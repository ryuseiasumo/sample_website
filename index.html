<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hata Cafe - 落ち着くひとときを</title>

    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>

    <style>
        /* CSS：オシャレなカフェの雰囲気を演出 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; color: #444; background: #faf8f5; }
        
        /* メインビジュアル */
        .hero { 
            height: 60vh; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('top.png') center/cover; 
            display: flex; justify-content: center; align-items: center; color: white;
        }
        
        /* スクロールを促すためにわざと長くする */
        .content { padding: 80px 20px; text-align: center; max-width: 800px; margin: auto; }
        .section { height: 500px; border-bottom: 1px dashed #ccc; padding-top: 50px; }
        
        /* 分析対象となるボタン：計測しやすいようIDを付ける */
        .btn { 
            display: inline-block; padding: 15px 30px; background: #8d6e63; color: white; 
            text-decoration: none; border-radius: 30px; transition: 0.3s; cursor: pointer; border: none;
        }
        .btn:hover { background: #6d4c41; transform: scale(1.05); }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="hero">
        <h1>Welcome to Hata Cafe</h1>
    </div>

    <div class="content">
        <div class="section" id="intro">
            <h2>こだわり抜いた豆と、静かな空間。</h2>
            <p>下へスクロールして、私たちのメニューをチェックしてください。</p>
        </div>

        <div class="section" id="menu">
            <h2>季節のケーキセット</h2>
            <p>評価4.0以上の厳選されたスイーツをご用意しています。</p>
            <button class="btn" id="reservation_btn">今すぐ予約する</button>
        </div>

        <div class="section" id="python-area">
            <h2>AIおすすめ診断</h2>
            <p>Python(Streamlit)を呼び出して、あなたにぴったりの一杯を診断します。</p>
            <button class="btn" onclick="callPython()">AI診断を起動</button>
            <div id="result-area"></div>
        </div>
    </div>

    <script>
        // JavaScript：動きと連携
        
        // ボタンクリック時の挙動
        document.getElementById('reservation_btn').onclick = function() {
            alert('予約ページへ進みます（このクリックはGTMで計測可能です）');
        };

        // Streamlitへの連携用（概念的な呼び出し）
        function callPython() {
            const area = document.getElementById('result-area');
            area.innerHTML = "<p style='color:#8d6e63;'>[Streamlit連携中...] Pythonコードが計算したおすすめ：『深煎りブレンド』</p>";
            console.log("Python Backend triggered.");
        }

        /* 【分析のポイント】
        GTMを設定すると、JavaScriptを書かなくても「ID: reservation_btn がクリックされた数」や
        「ページを90%まで読んだ（スクロールした）数」が自動でGA4に送られるようになります。
        */
    </script>
</body>
</html>
